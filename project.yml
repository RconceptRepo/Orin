name: Orin

options:
  bundleIdPrefix: com.rconcept
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "15.4"
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic

targets:
  Orin:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/Orin
    info:
      path: Orin/Info.plist
      properties:
        CFBundleDisplayName: Orin
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSApplicationCategoryType: public.app-category.productivity
        NSSupportsAutomaticGraphicsSwitching: true
        NSPrincipalClass: NSApplication
        CFBundleURLTypes:
          - CFBundleURLName: com.rconcept.orin
            CFBundleURLSchemes:
              - orin
        NSCalendarsUsageDescription: "Orin reads your local EventKit calendar to show upcoming events alongside tasks and trigger meeting detection."
        NSMicrophoneUsageDescription: "Orin uses the microphone only when you explicitly start meeting transcription. Audio is processed on-device and stored locally."
        NSSpeechRecognitionUsageDescription: "Orin transcribes meeting audio on-device using Apple Speech Recognition so your conversations never leave your Mac."
        NSAppleEventsUsageDescription: "Orin reads the active tab URL from your browser to detect whether you are in a video call (Google Meet, Zoom, Microsoft Teams). No browsing history is stored or transmitted."
        NSCameraUsageDescription: "Orin may use the camera for future video features. No camera access is used in V1."
        NSRemindersUsageDescription: "Orin may sync Reminders to surface them alongside tasks in future versions."
    entitlements:
      path: Orin.entitlements
      properties:
        com.apple.security.automation.apple-events: true
        com.apple.security.network.client: true
        com.apple.security.device.audio-input: true
        com.apple.security.personal-information.calendars: true
        com.apple.security.screen-recording: true
        keychain-access-groups:
          - "$(AppIdentifierPrefix)com.rconcept.orin"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rconcept.orin
        INFOPLIST_FILE: Orin/Info.plist
        CODE_SIGN_ENTITLEMENTS: Orin.entitlements
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        PRODUCT_NAME: Orin
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"

  OrinTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/OrinTests
    dependencies:
      - target: Orin
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rconcept.orin.tests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
